name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff (fast, single Python version)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ main.py

  # ---------------------------------------------------------------------------
  # Unit tests — matrix across Python versions
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

  # ---------------------------------------------------------------------------
  # Integration tests — download filings, then test against real data
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      USER_AGENT: "vca-flow-ci/1.0 (aneeshcheriank@gmail.com)"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download SEC filings for test date
        run: python src/download_sec_voluntary_filings.py --date 2026-06-22

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v
