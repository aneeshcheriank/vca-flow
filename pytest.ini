[pytest]
testpaths = tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (fast, no network/disk dependencies)
    integration: Integration tests (require real SEC filings on disk)

# Default: only run unit tests (add -m integration to run integration tests)
addopts = -m "unit" --strict-markers -v
